# Railway: set Root Directory to "backend" in the service settings.
# Add a PostgreSQL plugin and copy DATABASE_URL into Variables (or link the DB).

[build]
builder = "nixpacks"
# Migrations run at start (see deploy.startCommand) so the build does not require DB access.
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy && npm start"
restartPolicyType = "on_failure"
